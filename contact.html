<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MITAOE Library — Contact</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="scripts.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand"><div class="logo">ML</div><div><div class="site-title">MITAOE Library</div><div class="site-sub">Contact</div></div></div>
      <nav><ul><li><a href="index.html">Home</a></li><li><a href="books.html">Books</a></li><li><a href="student-login.html" class="badge">Student Login</a></li></ul></nav>
    </header>

    <main>
      <section class="row">
        <div class="form">
          <h2>Contact Us</h2>
          <p class="kv"><strong>Address:</strong> MITAOE Campus Library, Pune, India</p>
          <p class="kv"><strong>Email:</strong> <a href="mailto:library@mitaoe.ac.in">library@mitaoe.ac.in</a></p>
          <p class="kv"><strong>Phone:</strong> +91 98XXXXXXXX</p>
        </div>

        <div class="form">
          <h2>Send a Message</h2>
          <form>
            <label for="name">Your Name</label>
            <input id="name" class="input" type="text">

            <label for="email">Email</label>
            <input id="email" class="input" type="email">

            <label for="message">Message</label>
            <textarea id="message" class="input" rows="5"></textarea>

            <button class="btn" type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">© MITAOE Library</footer>
  </div>
</body>
</html>
