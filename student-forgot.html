<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MITAOE Library — Reset Password</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="scripts.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand"><div class="logo">ML</div><div><div class="site-title">MITAOE Library</div><div class="site-sub">Password Recovery</div></div></div>
      <nav><ul><li><a href="student-login.html" class="badge">Back to Login</a></li></ul></nav>
    </header>

    <main>
      <section class="form" style="max-width:500px;margin:2rem auto">
        <h2>Reset Password</h2>
        <p class="small">Enter Student ID + registered Email to set a new password.</p>
        <form id="student-forgot-form">
          <label for="fp-id">Student ID</label>
          <input id="fp-id" class="input" type="text" placeholder="202402070019" required>

          <label for="fp-email">Email</label>
          <input id="fp-email" class="input" type="email" placeholder="you@mitaoe.ac.in" required>

          <label for="fp-pass">New Password (min 4 chars)</label>
          <input id="fp-pass" class="input" type="password" required>

          <button class="btn" type="submit">Reset Password</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
